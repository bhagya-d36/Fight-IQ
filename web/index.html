<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>FightIQ</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Barlow:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
  rel="stylesheet"
/>
<link rel="stylesheet" href="/styles.css?v=9" />
</head>
<body>

<div class="arena-bg" aria-hidden="true"></div>

<header class="statusbar">
  <div class="statusbar__brand">
    <span class="statusbar__mark">Tale of the Cage</span>
  </div>
  <div class="statusbar__actions">
    <button class="statusbar__new" id="new-chat" type="button">NEW CHAT</button>
    <div class="statusbar__chip" id="status-chip" data-state="idle" role="status" aria-live="polite">
      <span id="status-text">READY</span>
    </div>
  </div>
</header>

<main class="arena">
  <section class="transcript" id="transcript">
    <div class="hero" id="hero">
      <h1 class="hero__title">FightIQ</h1>
      <p class="hero__sub">AI-Powered Mixed Martial Arts Library</p>
      <div class="chips" id="suggested-chips">
        <button class="chip" type="button" data-q="Who is the current lightweight champion?">Lightweight champion?</button>
        <button class="chip" type="button" data-q="What are the UFC weight classes?">Weight classes</button>
        <button class="chip" type="button" data-q="How is a fight scored?">Scoring rules</button>
        <button class="chip" type="button" data-q="When was the UFC founded?">UFC history</button>
      </div>
    </div>
  </section>
</main>

<form class="inputbar" id="ask-form" autocomplete="off">
  <input
    class="inputbar__field"
    id="question-input"
    type="text"
    placeholder="Ask anything about Mixed Martial Arts"
    maxlength="300"
    autofocus
  />
  <button class="inputbar__submit" type="submit" aria-label="Send">
    <span>ASK</span>
  </button>
</form>

<footer class="arena-footer">Not affiliated with UFC &middot; All answers are grounded in the knowledge base</footer>

<template id="tpl-turn">
  <article class="turn">
    <div class="turn__you">
      <span class="turn__you-label">YOU</span>
      <span class="turn__you-text"></span>
    </div>
    <div class="turn__bot">
      <div class="turn__bot-text"></div>
      <div class="turn__error" hidden>
        <span class="turn__error-text"></span>
        <button class="turn__retry" type="button">RETRY</button>
      </div>
      <div class="turn__sources" hidden>
        <button class="turn__sources-toggle" type="button" aria-expanded="false">SOURCES</button>
        <div class="turn__sources-list" hidden></div>
      </div>
    </div>
  </article>
</template>

<template id="tpl-source-row">
  <div class="srow">
    <span class="srow__name"></span>
  </div>
</template>

<script src="/app.js?v=7"></script>
</body>
</html>
